<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a11cb"/>
      <stop offset="100%" stop-color="#2575fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>
  
  <!-- Abstract M icon with shopping bag inspiration -->
  <path d="M120,120 C150,40 180,40 210,120 L240,120 C270,40 300,40 330,120 L360,120 C390,40 420,40 450,120" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="12" 
        stroke-linecap="round"
        filter="url(#shadow)"/>
  
  <!-- Shopping bag handle -->
  <path d="M150,120 Q180,80 210,120" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="12" 
        stroke-linecap="round"/>
  
  <!-- Magnus text -->
  <text x="300" y="200" 
        font-family="'Montserrat', sans-serif" 
        font-size="72" 
        font-weight="800" 
        fill="url(#gradient)"
        text-anchor="middle"
        letter-spacing="2px">
    MAGNUS
  </text>
  
  <!-- E-commerce tagline -->
  <text x="300" y="240" 
        font-family="'Montserrat', sans-serif" 
        font-size="24" 
        font-weight="300" 
        fill="#666"
        text-anchor="middle"
        letter-spacing="4px">
    PREMIUM E-COMMERCE
  </text>
</svg>